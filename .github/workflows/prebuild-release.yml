name: Build and Release Prebuilt Tarball

on:
  push:
    tags: ["*"]

jobs:
  build-prebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup the best engine ever
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bake Degoog
        env:
          NODE_ENV: production
        run: bun run build

      - name: Get version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Structure the prebuild stuff
        run: |
          mkdir -p prebuild-release/degoog
          cp package.json bun.lock* prebuild-release/degoog/
          cd prebuild-release/degoog && bun install --frozen-lockfile --production && cd ../..
          cp -r src prebuild-release/degoog/

      - name: Create tarball - tarball is a funny name
        run: |
          cd prebuild-release
          tar -czf degoog_${{ steps.version.outputs.version }}_prebuild.tar.gz degoog
          sha256sum degoog_${{ steps.version.outputs.version }}_prebuild.tar.gz > degoog_${{ steps.version.outputs.version }}_prebuild.tar.gz.sha256

      - name: Attach to Release - pray it works
        uses: softprops/action-gh-release@v1
        with:
          files: |
            prebuild-release/degoog_*_prebuild.tar.gz
            prebuild-release/degoog_*_prebuild.tar.gz.sha256
          tag_name: ${{ steps.version.outputs.version }}
